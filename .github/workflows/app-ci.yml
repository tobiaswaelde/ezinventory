name: App Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-ci.yml'

jobs:
  app-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm --filter @ezinventory/app exec nuxt prepare

      - name: Run app unit tests with coverage
        run: pnpm --filter @ezinventory/app test:coverage

      - name: Upload app coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/app/coverage/lcov.info
          flags: app
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Install Playwright browser
        run: pnpm --filter @ezinventory/app exec playwright install --with-deps chromium

      - name: Run app e2e tests
        run: pnpm --filter @ezinventory/app test
