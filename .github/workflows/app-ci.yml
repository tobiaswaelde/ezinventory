name: App Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-ci.yml'
  pull_request:
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-ci.yml'

jobs:
  app-test:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare Nuxt
        run: pnpm --filter @ezinventory/app exec nuxt prepare

      - name: Run app unit tests with coverage
        run: pnpm --filter @ezinventory/app test:coverage

      - name: Update app coverage badge JSON
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail
          pct=$(awk -F: '/^LF:/{lf+=$2} /^LH:/{lh+=$2} END { if (lf==0) printf "0.0"; else printf "%.1f", (lh/lf)*100 }' apps/app/coverage/lcov.info)
          color="red"
          awk -v p="$pct" 'BEGIN { if (p >= 90) exit 0; exit 1 }' && color="brightgreen" || true
          if [ "$color" = "red" ]; then
            awk -v p="$pct" 'BEGIN { if (p >= 75) exit 0; exit 1 }' && color="yellow" || true
          fi
          mkdir -p .github/badges
          printf '{"schemaVersion":1,"label":"app coverage","message":"%s%%","color":"%s"}
' "$pct" "$color" > .github/badges/app-coverage.json
          if ! git diff --quiet -- .github/badges/app-coverage.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add .github/badges/app-coverage.json
            git commit -m "ci: update app coverage badge [skip ci]"
            git push
          fi

      - name: Upload app coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/app/coverage/lcov.info
          flags: app
          slug: tobiaswaelde/ezinventory
          use_oidc: true
          verbose: true
          fail_ci_if_error: false

      - name: Install Playwright browser
        run: pnpm --filter @ezinventory/app exec playwright install --with-deps chromium

      - name: Run app e2e tests
        run: pnpm --filter @ezinventory/app test
