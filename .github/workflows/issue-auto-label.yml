name: Issue Auto Label

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write

jobs:
  label:
    runs-on: ubuntu-latest
    steps:
      - name: Apply labels based on issue form content
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const body = issue.body || '';
            const labels = new Set((issue.labels || []).map((l) => l.name));

            const getFieldValue = (fieldName) => {
              const escaped = fieldName.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
              const re = new RegExp(`###\\s*${escaped}\\s*\\n([\\s\\S]*?)(\\n###\\s|$)`, 'i');
              const match = body.match(re);
              if (!match) return '';
              return match[1].trim().toLowerCase();
            };

            const area = getFieldValue('Area');
            const priority = getFieldValue('Priority');

            const areaToLabel = {
              app: 'area:app',
              api: 'area:api',
              docs: 'area:docs',
              'ops/deployment': 'area:ops',
              'testing/ci': 'area:testing'
            };

            if (areaToLabel[area]) {
              labels.add(areaToLabel[area]);
            }

            if (priority === 'high') labels.add('priority:high');
            if (priority === 'medium') labels.add('priority:medium');

            if (labels.has('enhancement') || issue.title.toLowerCase().startsWith('feat:')) {
              labels.add('type:task');
            }

            await github.rest.issues.setLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              labels: [...labels]
            });
