name: Deploy Images (GHCR)

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: deploy-ghcr-${{ github.ref_name }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Targets
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      app: ${{ steps.filter.outputs.app }}
      base: ${{ steps.base.outputs.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve base reference
        id: base
        shell: bash
        run: |
          set -euo pipefail
          PREV_TAG="$(git describe --tags --abbrev=0 "${GITHUB_SHA}^" 2>/dev/null || true)"
          if [ -n "${PREV_TAG}" ]; then
            BASE_SHA="$(git rev-list -n 1 "${PREV_TAG}")"
          else
            BASE_SHA="$(git rev-list --max-parents=0 HEAD)"
          fi
          echo "sha=${BASE_SHA}" >> "${GITHUB_OUTPUT}"

      - name: Filter changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          base: ${{ steps.base.outputs.sha }}
          ref: ${{ github.sha }}
          filters: |
            api:
              - '.github/workflows/deploy-ghcr.yml'
              - '.dockerignore'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'apps/api/**'
              - 'packages/**'
            app:
              - '.github/workflows/deploy-ghcr.yml'
              - '.dockerignore'
              - 'pnpm-lock.yaml'
              - 'pnpm-workspace.yaml'
              - 'package.json'
              - 'apps/app/**'
              - 'packages/**'

  build-api:
    name: Build & Push API Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract API image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ezinventory-api
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile.ghcr
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-app:
    name: Build & Push App Image
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.app == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract App image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/ezinventory-app
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag

      - name: Build and push App image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/app/Dockerfile.ghcr
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
