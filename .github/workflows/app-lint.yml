name: App Lint

on:
  push:
    branches: [main]
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-lint.yml'
  pull_request:
    paths:
      - 'apps/app/**'
      - '.github/workflows/app-lint.yml'

jobs:
  app-lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint app
        run: pnpm --filter @ezinventory/app lint
