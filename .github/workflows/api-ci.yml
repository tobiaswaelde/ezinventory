name: API Test

on:
  push:
    branches: [main]
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'
  pull_request:
    paths:
      - 'apps/api/**'
      - '.github/workflows/api-ci.yml'

jobs:
  api-test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ezinventory
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prisma

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test API with coverage
        run: pnpm --filter @ezinventory/api test

      - name: Upload API coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: apps/api/coverage/lcov.info
          flags: api
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: tobiaswaelde/ezinventory
          verbose: true
          fail_ci_if_error: false
