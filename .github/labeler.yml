area:api:
  - changed-files:
      - any-glob-to-any-file:
          - 'apps/api/**'

area:app:
  - changed-files:
      - any-glob-to-any-file:
          - 'apps/app/**'

area:docs:
  - changed-files:
      - any-glob-to-any-file:
          - '.ai/**'
          - 'README.md'
          - 'CONTRIBUTING.md'
          - 'SECURITY.md'
          - '.github/ISSUE_TEMPLATE/**'

area:ops:
  - changed-files:
      - any-glob-to-any-file:
          - '.github/workflows/**'
          - 'compose.yaml'
          - 'Dockerfile'
          - '**/Dockerfile'

area:testing:
  - changed-files:
      - any-glob-to-any-file:
          - '**/*.test.ts'
          - '**/*.spec.ts'
          - 'apps/app/e2e/**'
          - 'apps/**/vitest.config.ts'
          - 'apps/**/playwright.config.ts'
