name: Bug Report
description: Report a reproducible problem in API, app, CI, or docs.
title: "bug: "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Where does the issue happen?
      options:
        - app
        - api
        - testing/ci
        - docs
        - ops/deployment
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Short description of the bug.
      placeholder: What is broken?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: Exact steps so we can reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Run ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen instead?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What happened instead?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste stack traces, screenshots, or CI links.
      render: shell

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, Node, pnpm, browser, etc.
      placeholder: macOS 14, Node 24.15.0, pnpm 10.33.0, Chrome 135

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-Checks
      options:
        - label: I searched for existing issues.
          required: true
        - label: I can reproduce this on the latest main branch.
          required: true
