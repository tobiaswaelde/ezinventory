services:
  workspace:
    image: mcr.microsoft.com/devcontainers/javascript-node:1-22-bookworm
    container_name: ezinventory-workspace
    working_dir: /workspaces/ez-inventory
    command: sleep infinity
    volumes:
      - ..:/workspaces/ez-inventory:cached
    environment:
      DATABASE_URL: postgresql://ezinventory:ezinventory@postgres:5432/ezinventory?schema=public
      SHADOW_DATABASE_URL: postgresql://ezinventory:ezinventory@postgres:5432/ezinventory_shadow?schema=public
      NUXT_PUBLIC_API_BASE_URL: http://localhost:3001/api/v1
      AUTH_PASSKEY_RP_ID: localhost
      AUTH_PASSKEY_RP_NAME: EZ Inventory
      AUTH_PASSKEY_ORIGIN: http://localhost:3000
      RUSTFS_ENDPOINT: http://rustfs:9000
      RUSTFS_BUCKET: ezinventory-media
      RUSTFS_PUBLIC_BASE_URL: http://localhost:9000
    depends_on:
      - postgres
      - rustfs

  postgres:
    image: postgres:16-alpine
    container_name: ezinventory-postgres-devcontainer
    environment:
      POSTGRES_DB: ezinventory
      POSTGRES_USER: ezinventory
      POSTGRES_PASSWORD: ezinventory
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  rustfs:
    image: rustfs/rustfs:latest
    container_name: ezinventory-rustfs-devcontainer
    ports:
      - "9000:9000"
    volumes:
      - rustfs_data:/data

volumes:
  postgres_data:
  rustfs_data:
