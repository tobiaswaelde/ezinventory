services:
  api:
    image: ghcr.io/tobiaswaelde/ezinventory-api:${EZINV_IMAGE_TAG:-main}
    container_name: ezinventory-api
    restart: unless-stopped
    environment:
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL}
      SHADOW_DATABASE_URL: ${SHADOW_DATABASE_URL}
      AUTH_ACCESS_TOKEN_SECRET: ${AUTH_ACCESS_TOKEN_SECRET}
      AUTH_REFRESH_TOKEN_SECRET: ${AUTH_REFRESH_TOKEN_SECRET}
      AUTH_ACCESS_TOKEN_TTL: ${AUTH_ACCESS_TOKEN_TTL:-900}
      AUTH_REFRESH_TOKEN_TTL: ${AUTH_REFRESH_TOKEN_TTL:-1209600}
      CORS_ORIGIN: ${CORS_ORIGIN:-https://example.com}
      AUTH_PASSKEY_RP_ID: ${AUTH_PASSKEY_RP_ID}
      AUTH_PASSKEY_RP_NAME: ${AUTH_PASSKEY_RP_NAME}
      AUTH_PASSKEY_ORIGIN: ${AUTH_PASSKEY_ORIGIN}
      RUSTFS_ENDPOINT: ${RUSTFS_ENDPOINT}
      RUSTFS_ACCESS_KEY: ${RUSTFS_ACCESS_KEY:-}
      RUSTFS_SECRET_KEY: ${RUSTFS_SECRET_KEY:-}
      RUSTFS_BUCKET: ${RUSTFS_BUCKET:-ezinventory-media}
      RUSTFS_PUBLIC_BASE_URL: ${RUSTFS_PUBLIC_BASE_URL}
    ports:
      - "3001:3001"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3001/api/v1/health').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  app:
    image: ghcr.io/tobiaswaelde/ezinventory-app:${EZINV_IMAGE_TAG:-main}
    container_name: ezinventory-app
    restart: unless-stopped
    environment:
      NUXT_PUBLIC_API_BASE_URL: ${NUXT_PUBLIC_API_BASE_URL}
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/').then((r)=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
